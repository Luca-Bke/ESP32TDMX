<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 DMX Controller</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #2d2d2d;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2 { margin-top: 0; color: #4CAF50; }
        h3 { margin-bottom: 15px; color: #ddd; }
        .hint {
            font-size: 13px;
            color: #888;
            margin-bottom: 20px;
            padding: 0 20px;
        }
        button {
            font-size: 18px;
            font-weight: bold;
            margin: 8px;
            padding: 15px 25px;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            transition: transform 0.1s, opacity 0.2s, background-color 0.2s;
            user-select: none;
            -webkit-user-select: none;
        }
        button:active {
            transform: scale(0.95);
        }
        button:disabled, input:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }
        
        /* Button-Styles */
        .btn-connect { background-color: #4CAF50; color: white; width: 80%; }
        .btn-connect:hover:not(:disabled) { background-color: #45a049; }
        
        .btn-disconnect { background-color: #f44336; color: white; width: 80%; }
        .btn-disconnect:hover:not(:disabled) { background-color: #da190b; }
        
        .btn-blinder { background-color: #FF9800; color: white; width: 28%; }
        .btn-blinder:hover:not(:disabled) { background-color: #e68a00; }
        .btn-blinder-hold { background-color: #e65c00; color: white; width: 80%; margin-top: 10px; }
        .btn-blinder-hold:hover:not(:disabled) { background-color: #cd5200; }
        
        .btn-strobe { background-color: #E91E63; color: white; width: 28%; }
        .btn-strobe:hover:not(:disabled) { background-color: #d81b60; }
        .btn-strobe-hold { background-color: #ad1457; color: white; width: 80%; margin-top: 10px; }
        .btn-strobe-hold:hover:not(:disabled) { background-color: #880e4f; }
        
        #status {
            font-size: 16px;
            margin: 20px 0;
            color: #aaaaaa;
            font-weight: bold;
        }
        hr {
            border: 0;
            height: 1px;
            background: #444;
            margin: 30px 0;
        }

        /* Slider Styling */
        .slider-container {
            margin: 20px 0;
            text-align: left;
            padding: 0 10%;
        }
        .slider-container label {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 8px;
            color: #ddd;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: #E91E63;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>DMX Serial Control</h2>
    <div class="hint">Wähle den USB-Port oder den gekoppelten Bluetooth-COM-Port aus.</div>
    
    <button id="connectBtn" class="btn-connect">🔌 USB / Bluetooth verbinden</button>
    <div id="status">Status: Nicht verbunden</div>
    
    <hr>
    
    <h3>Blinder (Amber)</h3>
    <div>
        <button id="bOnBtn" class="btn-blinder" disabled>ON</button>
        <button id="bOffBtn" class="btn-blinder" disabled>OFF</button>
    </div>
    <div>
        <button id="bHoldBtn" class="btn-blinder-hold" disabled>🔥 BLINDER HOLD</button>
    </div>

    <hr>

    <h3>Stroboskop (Kaltweiß)</h3>
    <div>
        <button id="sOnBtn" class="btn-strobe" disabled>ON</button>
        <button id="sOffBtn" class="btn-strobe" disabled>OFF</button>
    </div>
    <div>
        <button id="sHoldBtn" class="btn-strobe-hold" disabled>⚡ STROBE HOLD</button>
    </div>

    <div class="slider-container" style="margin-top: 30px;">
        <label for="tOnSlider">
            <span>Strobe ON-Zeit:</span>
            <span id="tOnDisplay">20 ms</span>
        </label>
        <input type="range" id="tOnSlider" min="5" max="300" value="20" disabled>
    </div>
    
    <div class="slider-container">
        <label for="tOffSlider">
            <span>Strobe OFF-Zeit:</span>
            <span id="tOffDisplay">80 ms</span>
        </label>
        <input type="range" id="tOffSlider" min="10" max="1000" value="80" disabled>
    </div>
</div>

<script>
    let port;
    let writer;

    const connectBtn = document.getElementById('connectBtn');
    const statusDiv = document.getElementById('status');
    
    // Alle steuerbaren UI-Elemente
    const interactiveElements = [
        document.getElementById('bOnBtn'), document.getElementById('bOffBtn'), document.getElementById('bHoldBtn'),
        document.getElementById('sOnBtn'), document.getElementById('sOffBtn'), document.getElementById('sHoldBtn'),
        document.getElementById('tOnSlider'), document.getElementById('tOffSlider')
    ];

    // --- VERBINDUNGSAUFBAU ---
    connectBtn.addEventListener('click', async () => {
        if (port) {
            await disconnectSerial();
            return;
        }
        await connectSerial();
    });

    async function connectSerial() {
        try {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });

            const textEncoder = new TextEncoderStream();
            const writableStreamClosed = textEncoder.readable.pipeTo(port.writable);
            writer = textEncoder.writable.getWriter();

            statusDiv.innerHTML = "Status: <span style='color: #4CAF50;'>Verbunden</span>";
            connectBtn.innerText = "✖ Verbindung trennen";
            connectBtn.className = "btn-disconnect";
            
            // Buttons und Slider aktivieren
            interactiveElements.forEach(el => el.disabled = false);
        } catch (error) {
            console.error("Fehler bei der Verbindung:", error);
            statusDiv.innerHTML = "Status: <span style='color: #f44336;'>Verbindung fehlgeschlagen</span>";
        }
    }

    async function disconnectSerial() {
        try {
            if (writer) {
                writer.releaseLock();
            }
            if (port) {
                await port.close();
                port = null;
            }
            statusDiv.innerHTML = "Status: Nicht verbunden";
            connectBtn.innerText = "🔌 USB / Bluetooth verbinden";
            connectBtn.className = "btn-connect";
            
            // Buttons und Slider deaktivieren
            interactiveElements.forEach(el => el.disabled = true);
        } catch (error) {
            console.error("Fehler beim Trennen:", error);
        }
    }

    async function sendCommand(cmd) {
        if (writer) {
            await writer.write(cmd + '\n');
            console.log("Gesendet:", cmd);
        }
    }

    // --- NORMALE AN/AUS BUTTONS ---
    document.getElementById('bOnBtn').addEventListener('click', () => sendCommand('B_ON'));
    document.getElementById('bOffBtn').addEventListener('click', () => sendCommand('B_OFF'));
    document.getElementById('sOnBtn').addEventListener('click', () => sendCommand('S_ON'));
    document.getElementById('sOffBtn').addEventListener('click', () => sendCommand('S_OFF'));


    // --- HOLD BUTTONS (Sicher gegen Hover-Fehltrigger durch Status-Tracking) ---
    const preventContext = (e) => e.preventDefault();
    const bHoldBtn = document.getElementById('bHoldBtn');
    const sHoldBtn = document.getElementById('sHoldBtn');

    let isBlinderHeld = false;
    let isStrobeHeld = false;

    // --- Blinder Hold Logik ---
    bHoldBtn.addEventListener('contextmenu', preventContext);
    
    const blinderPress = (e) => {
        if (e) e.preventDefault();
        if (!isBlinderHeld) {
            isBlinderHeld = true;
            sendCommand('B_ON');
        }
    };
    
    const blinderRelease = (e) => {
        if (e) e.preventDefault();
        if (isBlinderHeld) {
            isBlinderHeld = false;
            sendCommand('B_OFF');
        }
    };

    bHoldBtn.addEventListener('mousedown', blinderPress);
    bHoldBtn.addEventListener('touchstart', blinderPress);
    
    bHoldBtn.addEventListener('mouseup', blinderRelease);
    bHoldBtn.addEventListener('mouseleave', blinderRelease);
    bHoldBtn.addEventListener('touchend', blinderRelease);
    bHoldBtn.addEventListener('touchcancel', blinderRelease);


    // --- Strobe Hold Logik ---
    sHoldBtn.addEventListener('contextmenu', preventContext);
    
    const strobePress = (e) => {
        if (e) e.preventDefault();
        if (!isStrobeHeld) {
            isStrobeHeld = true;
            sendCommand('S_ON');
        }
    };
    
    const strobeRelease = (e) => {
        if (e) e.preventDefault();
        if (isStrobeHeld) {
            isStrobeHeld = false;
            sendCommand('S_OFF');
        }
    };

    sHoldBtn.addEventListener('mousedown', strobePress);
    sHoldBtn.addEventListener('touchstart', strobePress);
    
    sHoldBtn.addEventListener('mouseup', strobeRelease);
    sHoldBtn.addEventListener('mouseleave', strobeRelease);
    sHoldBtn.addEventListener('touchend', strobeRelease);
    sHoldBtn.addEventListener('touchcancel', strobeRelease);


    // --- SLIDER (Regler für Strobe-Zeiten) ---
    const tOnSlider = document.getElementById('tOnSlider');
    const tOnDisplay = document.getElementById('tOnDisplay');
    const tOffSlider = document.getElementById('tOffSlider');
    const tOffDisplay = document.getElementById('tOffDisplay');

    tOnSlider.addEventListener('input', () => {
        tOnDisplay.innerText = tOnSlider.value + " ms";
        sendCommand('T_ON:' + tOnSlider.value);
    });

    tOffSlider.addEventListener('input', () => {
        tOffDisplay.innerText = tOffSlider.value + " ms";
        sendCommand('T_OFF:' + tOffSlider.value);
    });

</script>
</body>
</html>
